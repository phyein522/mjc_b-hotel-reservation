spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:hotel;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
  sql:
    init:
      mode: always
    properties:
      hibernate:
        format_sql: true

hotel:
  save-folder: ./uploads
