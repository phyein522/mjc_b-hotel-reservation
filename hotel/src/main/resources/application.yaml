spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    url: jdbc:mariadb://localhost:33306/hotel
    username: root
    password: 1234
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
      # create-drop, update, validate, none

    show-sql: true

    properties:
      hibernate:
        format_sql: true

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.mjc.hotel
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 33000

file:
  upload-dir: uploads