spring:
  application:
    name: hotel
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hotel?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: hotel_user
    password: hotel9876!
  jpa:
    hibernate:
      ddl-auto: update
      # create-drop, update, validate, none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
      dialect: org.hibernate.dialect.MySQL8InnoDBDialect

server:
  port: 8989
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

hotel:
  save-folder: ./uploads

mybatis:
  configuration:
    map-underscore-to-camel-case: true
