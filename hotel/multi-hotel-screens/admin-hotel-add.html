<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>호텔 추가 - StayNow Admin</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="feature-additions.css">
</head>
<body class="admin-page">
  <div class="admin-shell">
    <aside class="admin-sidebar">
  <div class="admin-brand"><span class="mark">S</span><div><strong>StayNow Admin</strong><small>다중 호텔 예약 플랫폼</small></div></div>
  <div class="admin-hotel-switcher selectable"><span class="hotel-mark">ALL</span><select onchange="location.href=this.value"><option value="admin-dashboard.html" selected>전체 호텔</option><option value="hotel-admin-dashboard.html">그랜드 서울</option></select></div>
  <nav class="admin-nav">
    <div class="admin-nav-group">메인</div>
    <a class="" href="admin-dashboard.html">대시보드</a>
    <a class="" href="admin-reservations.html">예약 관리 <span class="nav-count">12</span></a>
    <a class="" href="admin-checkins.html">체크인 현황 <span class="nav-count alert">3</span></a>
    <a class="" href="admin-customers.html">고객 관리</a>
    <div class="admin-nav-group">객실</div>
    <a class="" href="admin-inventory.html">객실 관리</a>
    <a class="" href="admin-room-add.html">객실 추가</a>
    <div class="admin-nav-group">플랫폼</div>
    <a class="" href="admin-hotels.html">입점 호텔 관리</a>
    <a class="active" href="admin-hotel-add.html">호텔 추가</a>
    <a class="" href="admin-promotions.html">프로모션</a>
    <a class="" href="admin-settlement.html">정산 리포트</a>
    <div class="admin-nav-group">시스템</div>
    <a href="#">시스템 설정</a>
  </nav>
</aside>
    <main class="admin-main">
      <header class="admin-topbar">
        <div><h1>호텔 추가</h1><p>새 호텔 등록 시 사용자 검색에 노출될 호텔 태그까지 함께 입력합니다.</p></div>
        <div class="admin-actions"><a class="btn" href="admin-hotels.html">목록</a></div>
      </header>
      <section class="panel"><h2>호텔 기본 정보</h2><div class="form-grid"><div class="field"><label>호텔명</label><input value="남궁능 호텔 서울"></div><div class="field"><label>지역</label><input value="서울 강남구"></div><div class="field full"><label>주소</label><input value="서울 강남구 테헤란로 120"></div><div class="field"><label>대표 연락처</label><input value="02-0000-0000"></div><div class="field"><label>정산 계좌</label><input value="국민 123456-01-000000"></div><div class="field full"><label>호텔 태그</label><div class="hotel-tag-board"><span class="hotel-tag">비즈니스 <button>x</button></span><span class="hotel-tag">역세권 <button>x</button></span><span class="hotel-tag">신규오픈 <button>x</button></span></div><div class="tag-input-row"><input placeholder="예: 오션뷰, 가족여행, 반려동물, 수영장"><button class="btn primary">태그 추가</button></div></div><div class="field full"><label>교통 / 위치 안내</label><textarea>지하철 2호선 역삼역 도보 4분, 공항버스 정류장 도보 6분</textarea></div><div class="field full"><label>체크인 / 체크아웃 안내</label><textarea>체크인 15:00 이후, 체크아웃 11:00 이전. 프론트에서 신분증 확인 후 입실 가능합니다.</textarea></div></div></section>
<section class="admin-actions" style="margin-top:14px"><a class="btn" href="admin-hotels.html">취소</a><button class="btn primary">호텔 저장</button></section>
    </main>
  </div>
</body>
</html>
