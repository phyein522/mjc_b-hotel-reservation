<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="feature-additions.css">

<body>
  <header class="top"><div class="wrap top-inner"><a class="logo" href="user-home.html"><span class="mark">S</span>StayNow</a><nav class="nav"><a class="" href="user-home.html">메인</a><a class="" href="user-search.html">호텔 검색</a><a class="" href="user-room-reviews.html">객실 리뷰</a><a class="" href="user-history.html">예약내역</a><a class="active" href="user-login.html">로그인</a></nav></div></header>
  <main class="wrap auth-shell">

      <div class="row" style="border-bottom:0"><label style="display:flex;gap:8px;align-items:center;color:#667085;font-size:14px"><input type="checkbox" checked> 로그인 상태 유지</label><a href="#" style="color:#2563eb;font-weight:900;font-size:14px">비밀번호 찾기</a></div>

      <div class="divider">또는</div>
      <div class="social-login"><button class="btn">카카오로 로그인</button><button class="btn">네이버로 로그인</button></div>
      <div class="auth-links"><span>아직 계정이 없나요?</span><a href="user-register.html">회원가입</a></div>
    </div></section>
  </main>
