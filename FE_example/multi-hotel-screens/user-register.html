<html lang="ko">

<body>
  <header class="top"><div class="wrap top-inner"><a class="logo" href="user-home.html"><span class="mark">S</span>StayNow</a><nav class="nav"><a class="" href="user-home.html">메인</a><a class="" href="user-search.html">호텔 검색</a><a class="" href="user-room-reviews.html">객실 리뷰</a><a class="" href="user-history.html">예약내역</a><a class="active" href="user-login.html">로그인</a></nav></div></header>
  <main class="wrap auth-shell">
    <section class="card auth-card"><div class="panel">
      <div class="auth-title"><h1>회원가입</h1><p>회원가입 후 예약 내역을 한 곳에서 관리할 수 있습니다.</p></div>
      <div class="grid-2"><div class="field"><label>이름</label><input value="이서연"></div><div class="field"><label>연락처</label><input value="010-1234-5678"></div></div>

      <div class="field" style="margin-top:14px"><label>비밀번호</label><input type="password" value="password"></div>

      <a class="btn primary" href="user-login.html" style="width:100%;margin-top:16px">회원가입</a>
      <div class="auth-links"><span>이미 계정이 있나요?</span><a href="user-login.html">로그인</a></div>
    </div></section>
