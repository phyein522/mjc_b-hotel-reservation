<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>호실 추가 - StayNow Admin</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="feature-additions.css">
</head>
<body class="admin-page">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="admin-brand"><span class="mark">S</span><div><strong>StayNow Admin</strong><small>다중 호텔 예약 플랫폼</small></div></div>
      <div class="admin-hotel-switcher selectable"><span class="hotel-mark">ALL</span><select onchange="location.href=this.value"><option value="admin-dashboard.html" selected>전체 호텔</option><option value="hotel-admin-dashboard.html">그랜드 서울</option></select></div>
      <nav class="admin-nav"><div class="admin-nav-group">플랫폼</div><a class="" href="admin-dashboard.html">대시보드</a><a class="" href="admin-hotels.html">호텔 관리</a><a class="" href="admin-hotel-add.html">호텔 추가</a><a class="" href="admin-customers.html">회원 조회</a><div class="admin-nav-group">객실 / 리뷰</div><a class="" href="admin-inventory.html">객실 관리</a><a class="active" href="admin-room-add.html">객실 추가</a><a class="" href="admin-room-reviews.html">객실 리뷰</a><div class="admin-nav-group">운영 기능</div><a class="" href="admin-promotions.html">프로모션</a><a class="" href="admin-promotion-sales.html">프로모션 적용</a><a class="" href="admin-sales.html">매출 분석</a><div class="admin-nav-group">목업 흐름</div><a class="" href="admin-reservations.html">예약 관리 목업</a></nav>
    </aside>
    <main class="admin-main">
      <header class="admin-topbar">
        <div><h1>호실 추가</h1><p>호텔을 선택한 뒤 실제 운영할 호실 번호와 기본 정보를 등록합니다.</p></div>
        <div class="admin-actions"><a class="btn" href="admin-inventory.html">호실 목록</a></div>
      </header>
      <section class="panel">
        <h2>호실 기본 정보</h2>
        <div class="form-grid">
          <div class="field"><label>호텔 선택</label><select><option>그랜드 서울</option><option>해운대 오션</option><option>제주 포레스트</option></select></div>
          <div class="field"><label>호실 번호</label><input value="1203"></div>
          <div class="field"><label>객실 종류</label><input value="디럭스 더블"></div>
          <div class="field"><label>층수</label><input value="12"></div>
          <div class="field"><label>객실 크기</label><input value="32㎡"></div>
          <div class="field"><label>기본가</label><input value="198000"></div>
          <div class="field"><label>성인 최대</label><input value="2"></div>
          <div class="field"><label>아동 최대</label><input value="1"></div>
          <div class="field"><label>활성 여부</label><select><option>true</option><option>false</option></select></div>
          <div class="field"><label>판매 상태</label><select><option>판매중</option><option>판매중지</option><option>점검중</option></select></div>
          <div class="field"><label>전망 옵션</label><select><option>CITY</option><option>OCEAN</option><option>MOUNTAIN</option></select></div>
          <div class="field"><label>침대 옵션</label><select><option>DOUBLE</option><option>TWIN</option><option>KING</option></select></div>
          <div class="field full"><label>호실 이미지</label><div class="upload-box"><input type="file" accept="image/*" multiple><p class="muted">등록할 호실에 연결할 이미지를 선택합니다.</p><div class="upload-preview"><span class="upload-thumb"></span><span class="upload-thumb"></span></div></div></div>
        </div>
      </section>
      <section class="admin-actions" style="margin-top:14px"><a class="btn" href="admin-inventory.html">취소</a><button class="btn primary">호실 저장</button></section>
    </main>
  </div>
</body>
</html>
