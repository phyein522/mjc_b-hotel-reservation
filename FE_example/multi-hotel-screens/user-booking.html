<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StayNow 사용자 - 예약페이지</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="feature-additions.css">
</head>
<body>
  <header class="top"><div class="wrap top-inner"><a class="logo" href="user-home.html"><span class="mark">S</span>StayNow</a><nav class="nav"><a class="" href="user-home.html">메인</a><a class="active" href="user-search.html">호텔 검색</a><a class="" href="user-room-reviews.html">객실 리뷰</a><a class="" href="user-history.html">예약내역</a><a class="" href="user-login.html">로그인</a></nav></div></header>
  <main class="wrap main">
    <div class="section-head"><div><h1>예약페이지</h1><p class="sub">숙박 일정과 인원을 조정한 뒤 예약자 정보를 확인합니다.</p></div></div>

    <section class="card panel booking-control-panel">
      <h2>숙박 일정 및 인원</h2>
      <div class="grid-3" style="margin-top:16px">
        <div class="field"><label>체크인</label><input type="date" value="2026-07-14"></div>
        <div class="field"><label>체크아웃</label><input type="date" value="2026-07-16"></div>
        <div class="field"><label>숙박</label><select><option>2박</option><option>1박</option><option>3박</option><option>4박 이상</option></select></div>
      </div>
      <div class="guest-stepper-grid">
        <div class="guest-stepper"><div class="stepper-top"><div><strong>성인</strong><div class="meta">만 13세 이상</div></div><div class="stepper-controls"><button class="stepper-btn">-</button><span class="stepper-value">2</span><button class="stepper-btn">+</button></div></div></div>
        <div class="guest-stepper"><div class="stepper-top"><div><strong>아동</strong><div class="meta">만 12세 이하</div></div><div class="stepper-controls"><button class="stepper-btn">-</button><span class="stepper-value">0</span><button class="stepper-btn">+</button></div></div></div>
        <div class="guest-stepper"><div class="stepper-top"><div><strong>객실</strong><div class="meta">예약 객실 수</div></div><div class="stepper-controls"><button class="stepper-btn">-</button><span class="stepper-value">1</span><button class="stepper-btn">+</button></div></div></div>
      </div>
      <div class="actions" style="margin-top:16px"><button class="btn primary">변경 내용 적용</button><a class="btn" href="user-detail.html">객실 다시 선택</a></div>
    </section>

    <div class="grid-2">
      <section class="card panel"><h2>예약자 정보</h2><div class="grid-2" style="margin-top:16px"><div class="field"><label>이름</label><input value="이서연"></div><div class="field"><label>연락처</label><input value="010-1234-5678"></div></div><div class="field" style="margin-top:14px"><label>이메일</label><input value="seoyeon@example.com"></div><div class="field" style="margin-top:14px"><label>요청사항</label><input value="고층 객실 선호"></div></section>
      <aside class="card panel"><h2>예약 요약</h2><div class="row"><span>예약 호텔</span><strong>그랜드 서울 호텔</strong></div><div class="row"><span>예약 객실</span><strong>디럭스 더블 · 1객실</strong></div><div class="row"><span>일정</span><strong>2026.07.14 ~ 2026.07.16 · 2박</strong></div><div class="row"><span>인원</span><strong>성인 2명 · 아동 0명</strong></div><div class="row"><span>결제 예정금액</span><strong>396,000원</strong></div><a class="btn primary" href="user-payment.html" style="width:100%;margin-top:14px">결제 화면으로 이동</a></aside>
    </div>
  </main>
</body>
</html>
