<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StayNow 사용자 - 객실 리뷰</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="feature-additions.css">
</head>
<body>
<header class="top">
    <div class="wrap top-inner"><a class="logo" href="user-home.html"><span class="mark">S</span>StayNow</a>
        <nav class="nav"><a href="user-home.html">메인</a><a href="user-search.html">호텔 검색</a><a class="active"
                                                                                               href="user-room-reviews.html">객실
            리뷰</a><a href="user-history.html">예약내역</a><a href="user-login.html">로그인</a></nav>
    </div>
</header>
<main class="wrap main">
    <div class="section-head">
        <div><h1>객실 리뷰</h1>
            <p class="sub">Review, ReviewPhoto, ReviewTag, ReviewRating 구현 범위를 사용자 화면에 반영했습니다.</p></div>
        <a class="btn" href="user-detail.html">호텔 상세</a></div>
    <section class="grid-2">
        <div class="card panel"><h2>리뷰 목록</h2>
            <table class="table">
                <tbody>
                <tr>
                    <td><strong>디럭스 더블</strong><br><span class="muted">김민준 · BUSINESS</span></td>
                    <td>5.0</td>
                    <td><span class="photo-count">2장</span></td>
                </tr>
                <tr>
                    <td><strong>프리미어 트윈</strong><br><span class="muted">정아린 · FAMILY</span></td>
                    <td>4.5</td>
                    <td><span class="photo-count">3장</span></td>
                </tr>
                </tbody>
            </table>
        </div>
        <aside class="card panel"><h2>리뷰 작성</h2>
            <div class="field"><label>객실</label><select>
                <option>디럭스 더블</option>
                <option>프리미어 트윈</option>
            </select></div>
            <div class="field" style="margin-top:12px"><label>제목</label><input value="객실이 조용하고 깨끗했어요"></div>
            <div class="field" style="margin-top:12px"><label>평점</label><select>
                <option>5</option>
                <option>4</option>
                <option>3</option>
            </select></div>
            <div class="field" style="margin-top:12px"><label>리뷰 내용</label><textarea>객실 이용 경험을 입력하세요.</textarea></div>
            <div class="field" style="margin-top:12px"><label>이미지 첨부</label>
                <div class="upload-box"><input type="file" accept="image/*" multiple>
                    <div class="upload-preview"><span class="upload-thumb"></span><span class="upload-thumb"></span>
                    </div>
                </div>
            </div>
            <button class="btn primary" style="width:100%;margin-top:14px">리뷰 등록</button>
        </aside>
    </section>
</main>
</body>
</html>
